[gcode_shell_command PLAY_READY]
command: play -v 1.2 /home/biqu/printer_data/config/audio/ready.mp3
timeout: 10
verbose: False

[gcode_shell_command PLAY_START]
command: play -v 1.2 /home/biqu/printer_data/config/audio/start.mp3
timeout: 10
verbose: False

[gcode_shell_command PLAY_DONE]
command: play -v 1.2 /home/biqu/printer_data/config/audio/done.mp3
timeout: 10
verbose: False

[gcode_shell_command PLAY_ERROR]
command: play -v 1.2 /home/biqu/printer_data/config/audio/error.mp3
timeout: 10
verbose: False

[gcode_macro AUDIO_READY]
gcode:
    RUN_SHELL_COMMAND CMD=PLAY_READY

[gcode_macro AUDIO_START]
gcode:
    RUN_SHELL_COMMAND CMD=PLAY_START

[gcode_macro AUDIO_DONE]
gcode:
    RUN_SHELL_COMMAND CMD=PLAY_DONE

[gcode_macro AUDIO_ERROR]
gcode:
    RUN_SHELL_COMMAND CMD=PLAY_ERROR