# Custom macros for Voron 2.4 300mm

[gcode_macro PRINT_START]
description: Start print sequence
gcode:
  {% set BED_TEMP = params.BED|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}
  M190 S{BED_TEMP}               ; Wait for bed to reach temperature
  M104 S{EXTRUDER_TEMP}          ; Start heating extruder (no wait)
  G28                            ; Home all axes
  Z_TILT_ADJUST                  ; Adjust Z tilt (Voron 2.4 specific)
  BED_MESH_CALIBRATE             ; Calibrate bed mesh
  G90                            ; Absolute positioning
  G1 Z5 F3000                   ; Move Z up
  M109 S{EXTRUDER_TEMP}          ; Wait for extruder to reach temperature
  G92 E0                         ; Reset extruder

[gcode_macro PRINT_END]
description: End print sequence
gcode:
  M400                           ; Wait for buffer to clear
  G92 E0                         ; Zero the extruder
  G1 E-5.0 F3600                 ; Retract filament
  G91                            ; Relative positioning
  G0 Z1.00 X20.0 Y20.0 F20000   ; Move nozzle to remove stringing
  TURN_OFF_HEATERS
  M107                           ; Turn off fan
  G1 Z2 F3000                   ; Move Z up an additional 2mm (total ~3mm clearance)
  G90                            ; Absolute positioning
  G0 X150 Y300 F3600             ; Park toolhead
  BED_MESH_CLEAR
