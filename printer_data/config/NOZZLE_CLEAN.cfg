[gcode_macro NOZZLE_CLEAN]
description: "Cleans the nozzle by wiping on a brush/pad"
gcode:
    # Set your nozzle cleaning temperature (adjust if needed)
    M109 S150  ; Set nozzle temp to 150°C and wait

    G90
    G1 X200 Y300 Z7 F5000  ; Move to starting position of wipe area
    G1 Z4              ; Lift nozzle slightly

    # Perform the wiping motion (adjust distances if needed)
    G1 X250 Y300 F6000  ; Wipe forward
    G1 X200 Y298 F6000  ; Wipe backward
    G1 X250 Y300 F6000  ; Wipe forward
    G1 X200 Y298 F6000  ; Wipe backward
    G1 X250 Y300 F6000  ; Wipe forward
    G1 X200 Y298 F6000  ; Wipe backward
    G1 X250 Y300 F6000  ; Wipe forward
    G1 X200 Y298 F6000  ; Wipe backward
    G1 X250 Y300 F6000  ; Wipe forward
    G1 X200 Y298 F6000  ; Wipe backward
    

    {% if save_gcode_state %}
        RESTORE_GCODE_STATE NAME=CLEAN_NOZZLE_STATE
    {% endif %}